# Fast Notification Service Configuration
# Edit this file to customize service behavior
# Restart the service after changes: systemctl --user restart fast-notification

# TCP port to listen on (default: 52345, falls back to 52346-52349 if unavailable)
NOTIFICATION_PORT=52345

# Log file path
NOTIFICATION_LOG_FILE=/var/log/fast-notification/listener.log

# Configuration directory
NOTIFICATION_CONFIG_DIR=/etc/fast-notification

# Notification templates directory
NOTIFICATION_TEMPLATE_DIR=/etc/fast-notification/templates